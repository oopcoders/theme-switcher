<main class="app-shell">
  <section class="theme-panel" aria-labelledby="app-title">
    <p class="eyebrow">Angular basics</p>
    <h1 id="app-title">{{ title }}</h1>
    <p class="description">
      Pick a theme and refresh the page. Your choice stays saved with localStorage.
    </p>

    <div class="theme-actions" aria-label="Theme options">
      <button
        type="button"
        [class.active]="selectedTheme() === 'light'"
        (click)="setTheme('light')"
      >
        Light Mode
      </button>
      <button
        type="button"
        [class.active]="selectedTheme() === 'dark'"
        (click)="setTheme('dark')"
      >
        Dark Mode
      </button>
      <button
        type="button"
        [class.active]="selectedTheme() === 'system'"
        (click)="setTheme('system')"
      >
        System Mode
      </button>
    </div>

    <article class="preview-card">
      <span class="preview-label">Preview card</span>
      <h2>{{ themeLabel() }} theme selected</h2>
      <p>
        The page colors come from a class on the document body, so the whole app can react to
        one small setting.
      </p>
    </article>

    <p class="current-theme">Current theme: <strong>{{ themeLabel() }}</strong></p>
  </section>
</main>
